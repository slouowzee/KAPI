name: Bug Report
description: Create a report to help us improve KAPI
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible to help us resolve the issue quickly.
  - type: input
    id: version
    attributes:
      label: KAPI Version
      description: What version of KAPI are you using? (Run `kapi --version` or specify if built from source)
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      description: Which OS and version? (e.g., macOS 14.1, Ubuntu 22.04, Windows 11)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps To Reproduce
      description: What commands did you run? What selections did you make in the TUI?
      placeholder: |
        1. Run `kapi`
        2. Select 'Next.js'
        3. Choose 'npm'
        4. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: If applicable, add terminal output or screenshots to help explain your problem.
    validations:
      required: false
